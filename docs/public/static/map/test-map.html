<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国地图测试</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        #map-container {
            width: 1000px;
            height: 800px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        }
    </style>
</head>
<body>
    <h1>中国地图测试</h1>
    <div id="map-container"></div>
    
    <script>
        // 中国地图配置
        const mapOption = {
            title: {
                text: '中国地图',
                left: 'center',
                textStyle: {
                    fontSize: 20,
                    fontWeight: 'bold'
                }
            },
            tooltip: {
                trigger: 'item',
                formatter: '{b}: {c}',
                backgroundColor: 'rgba(0, 0, 0, 0.7)',
                textStyle: {
                    color: '#fff'
                }
            },
            visualMap: {
                min: 0,
                max: 150,
                left: 'left',
                top: 'bottom',
                text: ['高', '低'],
                calculable: true,
                inRange: {
                    color: ['#e0f2fe', '#3b82f6', '#1d4ed8']
                }
            },
            series: [
                {
                    name: '地区',
                    type: 'map',
                    map: 'china',
                    roam: true,
                    zoom: 1.2,
                    center: [104, 38],
                    label: {
                        show: true,
                        fontSize: 10,
                        color: '#333'
                    },
                    emphasis: {
                        label: {
                            show: true,
                            fontSize: 12,
                            fontWeight: 'bold',
                            color: '#fff'
                        },
                        itemStyle: {
                            areaColor: '#ff6b35'
                        }
                    },
                    data: [
                        { name: '北京', value: 100 },
                        { name: '上海', value: 120 },
                        { name: '广东', value: 150 },
                        { name: '浙江', value: 90 },
                        { name: '江苏', value: 110 },
                        { name: '山东', value: 80 },
                        { name: '河南', value: 70 },
                        { name: '四川', value: 60 },
                        { name: '湖北', value: 50 },
                        { name: '湖南', value: 40 }
                    ]
                }
            ]
        };
        
        // 初始化图表
        function initChart() {
            console.log('开始初始化图表');
            const container = document.getElementById('map-container');
            
            if (container) {
                console.log('找到容器元素');
                console.log('容器尺寸:', {
                    width: container.clientWidth,
                    height: container.clientHeight,
                    offsetWidth: container.offsetWidth,
                    offsetHeight: container.offsetHeight
                });
                
                if (container.clientWidth > 0 && container.clientHeight > 0) {
                    console.log('容器尺寸正常，初始化图表');
                    const chart = echarts.init(container);
                    
                    // 加载地图数据
                    fetch('https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json')
                        .then(response => response.json())
                        .then(data => {
                            console.log('地图数据加载成功');
                            echarts.registerMap('china', data);
                            chart.setOption(mapOption);
                            console.log('图表初始化成功');
                        })
                        .catch(error => {
                            console.error('加载地图数据失败:', error);
                            chart.setOption(mapOption);
                        });
                    
                    // 窗口大小变化时重绘
                    window.addEventListener('resize', () => {
                        chart.resize();
                    });
                } else {
                    console.error('容器尺寸为0，无法初始化图表');
                    setTimeout(initChart, 300);
                }
            } else {
                console.error('未找到容器元素');
                setTimeout(initChart, 300);
            }
        }
        
        // 页面加载完成后初始化
        window.onload = initChart;
    </script>
</body>
</html>
